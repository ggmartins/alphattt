<div class="session-card">
  <div class="session-header">
    <div>
      <h3>Session #{{ session.sessionId }}</h3>
      <p class="timestamp">
        Last updated: {{ session.timestamp }}
      </p>
    </div>

    <span
      class="status-badge"
      [ngClass]="{
        'status-finished': session.status === 'finished',
        'status-ongoing': session.status === 'ongoing',
        'status-not-launched': session.status === 'not_launched'
      }"
    >
      {{ statusLabel }}
    </span>
  </div>

  <div class="players-grid">
    <div class="player-box">
      <p class="player-name">Versus: {{ session.vsplayer }} | Next Turn: {{ session.nextTurn }}</p>
    </div>

  </div>

  <div class="actions">
    <button
      type="button"
      class="launch-button"
      [disabled]="!canLaunch"
      (click)="onLaunchClick()"
    >
      Launch Match
    </button>
  </div>
</div>
